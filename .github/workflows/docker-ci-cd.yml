  security-scan:
    runs-on: ubuntu-latest
    # needs: sonarcloud-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Build Backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backendd
          push: false
          load: true
          tags: stage-backend:scan
      
      - name: Build Frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./TechnoMstr
          push: false
          load: true
          tags: stage-frontend:scan
      
      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stage-backend:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stage-frontend:scan
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  build-and-push:
    runs-on: ubuntu-latest
    needs: security-scan  # Assure que le scan de sécurité est terminé avant de pousser
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backendd
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-backend:latest
        
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./TechnoMstr
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-frontend:latest
