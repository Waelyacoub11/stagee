name: Docker CI/CD Pipeline with SonarCloud

on:
  push:
    branches: [ main ]  # Ajuste selon ta branche principale (main, master, develop, etc.)
  pull_request:
    branches: [ main ]

jobs:
  sonarcloud-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better relevancy of analysis
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Nécessaire pour l'analyse des PR
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          
      - name: Affichage du job SonarCloud
        run: |
          echo "========================================="
          echo "L'analyse SonarCloud est terminée"
          echo "Vérifiez les résultats sur SonarCloud.io"
          echo "========================================="
          sleep 10

  build-and-push:
    runs-on: ubuntu-latest
    needs: sonarcloud-analysis  # Assure que l'analyse est terminée avant de construire
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backendd
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-backend:latest
        
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./TechnoMstr
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-frontend:latest
