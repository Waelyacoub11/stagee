name: Docker CI/CD Pipeline with SonarCloud

on:
  push:
    branches: [ main ]  # Ajuste selon ta branche principale (main, master, develop, etc.)
  pull_request:
    branches: [ main ]

# Permissions nécessaires pour les actions de sécurité
permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

jobs:
