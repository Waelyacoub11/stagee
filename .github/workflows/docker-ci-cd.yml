name: Docker CI/CD Pipeline with SonarCloud

on:
  push:
    branches: [ main ]  # Ajuste selon ta branche principale (main, master, develop, etc.)
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backendd
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-backend:latest
        
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./TechnoMstr
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/stage-frontend:latest
